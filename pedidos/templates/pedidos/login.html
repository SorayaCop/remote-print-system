<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Remote Print System</title>
    <style>
        body{
            margin:0;
            background:#f4f4f4;
            font-family:Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .box{
            background:#fff;
            width:100%;
            max-width:420px;
            padding:30px;
            border-radius:12px;
            box-shadow:0 4px 14px rgba(0,0,0,.08);
        }

        h1{
            margin-top:0;
            text-align:center;
            font-size:28px;
        }

        p{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        label{
            display:block;
            font-weight:bold;
            margin-bottom:6px;
            margin-top:15px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            margin-top:22px;
            padding:14px;
            border:none;
            background:#111;
            color:#fff;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .erro{
            background:#ffe5e5;
            color:#a40000;
            padding:10px;
            border-radius:8px;
            margin-bottom:15px;
            text-align:center;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Remote Print System</h1>
    <p>Acesso restrito</p>

    {% if form.errors %}
        <div class="erro">
            Usuário ou senha inválidos.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label>Usuário</label>
        <input type="text" name="username" required>

        <label>Senha</label>
        <input type="password" name="password" required>

        <button type="submit">Entrar</button>
    </form>
</div>

</body>
</html>
