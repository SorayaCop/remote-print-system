<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido enviado</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            background:#fff;
            padding:30px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 2px 12px rgba(0,0,0,.08);
            width:90%;
            max-width:420px;
        }

        a{
            display:inline-block;
            margin-top:20px;
            background:#111;
            color:#fff;
            text-decoration:none;
            padding:12px 18px;
            border-radius:8px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Pedido salvo com sucesso!</h1>
        <a href="/">Novo pedido</a>
    </div>
</body>
</html>
