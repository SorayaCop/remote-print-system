<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Pedido | Remote Print System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 30px 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
        }

        .logout {
            text-decoration: none;
            background: #111;
            color: #fff;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
        }

        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #111;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover,
        .logout:hover {
            opacity: 0.92;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topo">
            <h1>Novo Pedido</h1>
            <a href="{% url 'logout' %}" class="logout">Sair</a>
        </div>

        <form method="post">
            {% csrf_token %}

            <label for="cliente_nome">Nome do cliente</label>
            <input type="text" id="cliente_nome" name="cliente_nome" required>

            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" name="endereco" required>

            <label for="pedido">Pedido</label>
            <textarea id="pedido" name="pedido" required></textarea>

            <label for="taxa_entrega">Taxa de entrega</label>
            <input type="text" id="taxa_entrega" name="taxa_entrega" placeholder="0,00" required>

            <label for="total">Total</label>
            <input type="text" id="total" name="total" placeholder="0,00" required>

            <label for="pagamento">Pagamento</label>
            <input type="text" id="pagamento" name="pagamento" required placeholder="Ex: RECEBER NA ENTREGA TROCO PARA 100">

            <button type="submit">Salvar pedido</button>
        </form>
    </div>
</body>
</html>
